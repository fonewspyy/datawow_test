services:
  postgres:
    image: postgres:16-alpine
    container_name: concert-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: concert_reservation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d concert_reservation"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: concert-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/concert_reservation?schema=public
      JWT_SECRET: concert-dev-secret
      JWT_EXPIRES_IN_SECONDS: "86400"
      PORT: "3001"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
    container_name: concert-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
      PORT: "3000"
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data: